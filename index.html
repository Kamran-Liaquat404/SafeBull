<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SafeBull - Your Digital Guard</title>
    <link rel="stylesheet" href="style.css">
</head>
<body class="light-theme">
    <header>
        <div class="header-left">
            <h1>SafeBull</h1>
            <p>Your Digital Security Companion</p>
        </div>
        <div class="header-right">
            <div class="menu-dot" id="menuDot">⋮</div>
            <div class="dropdown-menu" id="dropdownMenu">
                <button id="toggleTheme">Dark/Light</button>
            </div>
        </div>
    </header>

    <main>
        <!-- Password Generator -->
        <section class="generator-section">
            <h2>Password Generator</h2>
            <input type="text" id="keyword" placeholder="Enter your name / keyword">
            <input type="number" id="year" placeholder="Optional: Add year">
            <input type="text" id="activity" placeholder="Optional: Favorite activity / place">
            <button id="generateBtn">Generate Strong Password</button>
            <div class="results">
                <p id="password1"></p>
                <p id="password2"></p>
            </div>
        </section>

        <!-- Password Analyzer -->
        <section class="analyzer-section">
            <h2>Password Strength Analyzer</h2>
            <input type="text" id="analyzeInput" placeholder="Paste your password to check">
            <button id="analyzeBtn">Check Strength</button>
            <div id="analysisResult"></div>
        </section>

        <!-- Social Media Tips -->
        <section class="tips-section">
            <h2>Security Tips</h2>
            <ul id="tipsList"></ul>
        </section>

    <!-- JS Modules -->
    <script src="tips.js"></script>
    <script src="generator.js"></script>
    <script src="analyzer.js"></script>
    <script src="crackTime.js"></script>
    <script src="warnings.js"></script>
    <script src="app.js"></script>

    <script>
        const menuDot = document.getElementById('menuDot');
        const dropdown = document.getElementById('dropdownMenu');
        const toggleThemeBtn = document.getElementById('toggleTheme');

        // Load saved theme from localStorage
        const savedTheme = localStorage.getItem('theme');
        if (savedTheme) {
            document.body.classList.remove('light-theme', 'dark-theme');
            document.body.classList.add(savedTheme);
        }

        // Function to hide dropdown
        function hideDropdown() {
            dropdown.classList.remove('show');
        }

        // Show dropdown when 3-dot clicked
        menuDot.addEventListener('click', (e) => {
            e.stopPropagation(); // Prevent document click from firing
            dropdown.classList.toggle('show');
        });

        // Theme toggle button
        toggleThemeBtn.addEventListener('click', () => {
            if (document.body.classList.contains('light-theme')) {
                document.body.classList.remove('light-theme');
                document.body.classList.add('dark-theme');
                localStorage.setItem('theme', 'dark-theme');
            } else {
                document.body.classList.remove('dark-theme');
                document.body.classList.add('light-theme');
                localStorage.setItem('theme', 'light-theme');
            }
            hideDropdown(); // Hide dropdown after selection
        });

        // Hide dropdown if user clicks anywhere outside
        document.addEventListener('click', (e) => {
            if (!dropdown.contains(e.target) && e.target !== menuDot) {
                hideDropdown();
            }
        });

        // Hide dropdown on scroll
        window.addEventListener('scroll', () => {
            hideDropdown();
        });
    </script>
</body>
    </html>
